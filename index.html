<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Timmy</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #211817;
      --paper: #fff7de;
      --sun: #ffd45a;
      --red: #ef4444;
      --green: #55d98b;
      --cyan: #5ed6ff;
      --panel: rgba(255, 247, 222, .94);
      --shadow: rgba(0, 0, 0, .35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #101820;
      color: var(--paper);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 212, 90, .38), transparent 12rem),
        radial-gradient(circle at 88% 8%, rgba(94, 214, 255, .22), transparent 13rem),
        linear-gradient(160deg, #111827 0%, #172033 48%, #241613 100%);
    }

    .app {
      width: min(100vw, 560px);
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 58px;
    }

    h1 {
      margin: 0;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(42px, 14vw, 76px);
      line-height: .8;
      color: var(--sun);
      letter-spacing: 0;
      text-shadow: 3px 3px 0 var(--ink), 0 10px 24px var(--shadow);
    }

    .hud {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: flex-end;
    }

    .chip,
    button {
      border: 3px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      font-weight: 900;
      text-transform: uppercase;
    }

    .chip {
      min-width: 70px;
      padding: 7px 8px 6px;
      text-align: center;
      font-size: 11px;
      line-height: 1;
      transform: rotate(-1deg);
    }

    .chip strong {
      display: block;
      margin-top: 3px;
      font-size: 24px;
      line-height: .9;
    }

    .stage-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: min(96vw, 100%, calc(100dvh - 190px));
      max-width: 540px;
      aspect-ratio: 1 / 1;
      border: 5px solid var(--ink);
      background: #b9eccb;
      box-shadow: 7px 7px 0 var(--ink), 0 22px 60px var(--shadow);
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #b9eccb;
    }

    .toast {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(.65) rotate(-8deg);
      color: var(--red);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(58px, 21vw, 122px);
      letter-spacing: 0;
      text-shadow: 4px 4px 0 var(--paper), 8px 8px 0 var(--ink), 0 16px 30px var(--shadow);
    }

    .toast.show {
      animation: tukutu .72s cubic-bezier(.18, .89, .32, 1.28);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(13, 18, 28, .68);
      text-align: center;
    }

    .panel {
      width: min(92%, 390px);
      padding: 22px;
      border: 4px solid var(--ink);
      background: var(--panel);
      color: var(--ink);
      box-shadow: 7px 7px 0 var(--ink);
      transform: rotate(-1deg);
    }

    .panel h2 {
      margin: 0 0 8px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(34px, 12vw, 52px);
      line-height: .95;
      letter-spacing: 0;
    }

    .panel p {
      margin: 0 0 16px;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.32;
    }

    button {
      min-height: 46px;
      border-radius: 0;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    button:disabled {
      opacity: .6;
      cursor: wait;
    }

    .mobile-pad {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 10px;
    }

    .hint {
      align-self: center;
      min-width: 0;
      color: rgba(255, 247, 222, .84);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.25;
    }

    .dpad {
      width: 154px;
      display: grid;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 5px;
      justify-content: center;
    }

    .dpad button {
      min-height: 48px;
      padding: 0;
      font-size: 24px;
      line-height: 1;
    }

    .dpad button[data-dir="up"] { grid-column: 2; grid-row: 1; }
    .dpad button[data-dir="left"] { grid-column: 1; grid-row: 2; }
    .dpad button[data-dir="right"] { grid-column: 3; grid-row: 2; }
    .dpad button[data-dir="down"] { grid-column: 2; grid-row: 3; }

    .status-strip {
      justify-self: end;
      align-self: center;
      display: grid;
      gap: 5px;
      text-align: right;
      color: rgba(255, 247, 222, .8);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.15;
    }

    .hidden {
      display: none !important;
    }

    @keyframes tukutu {
      0% { opacity: 0; transform: scale(.48) rotate(-12deg); }
      18% { opacity: 1; transform: scale(1.15) rotate(3deg); }
      62% { opacity: 1; transform: scale(1) rotate(-2deg); }
      100% { opacity: 0; transform: scale(1.45) rotate(8deg); }
    }

    @media (min-width: 720px) {
      .app {
        padding-top: 18px;
        padding-bottom: 18px;
      }

      .stage {
        width: min(78vh, 560px);
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Juego Timmy para movil">
    <header>
      <h1>Timmy</h1>
      <div class="hud" aria-live="polite">
        <div class="chip">Puntos <strong id="score">0</strong></div>
        <div class="chip">Mejor <strong id="best">0</strong></div>
      </div>
    </header>

    <div class="stage-wrap">
      <section class="stage" id="stage">
        <canvas id="game" width="640" height="640" aria-label="Tablero del juego Timmy"></canvas>
        <div class="toast" id="toast">tukutu</div>
        <div class="overlay" id="overlay">
          <div class="panel">
            <h2 id="overlayTitle">Cargando</h2>
            <p id="overlayText">Preparando las imagenes del juego.</p>
            <button id="startButton" type="button" disabled>Empezar</button>
          </div>
        </div>
      </section>
    </div>

    <nav class="mobile-pad" aria-label="Controles del juego">
      <div class="hint">Desliza sobre el tablero o usa los botones.</div>
      <div class="dpad" aria-label="Controles tactiles">
        <button type="button" data-dir="up" aria-label="Arriba">&uarr;</button>
        <button type="button" data-dir="left" aria-label="Izquierda">&larr;</button>
        <button type="button" data-dir="right" aria-label="Derecha">&rarr;</button>
        <button type="button" data-dir="down" aria-label="Abajo">&darr;</button>
      </div>
      <div class="status-strip">
        <span>Timmy es la cabeza.</span>
        <span>Las imagenes cambian al azar.</span>
      </div>
    </nav>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const stage = document.getElementById("stage");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const scoreNode = document.getElementById("score");
    const bestNode = document.getElementById("best");
    const toast = document.getElementById("toast");

    const assetList = [
      { id: "timmy", label: "Timmy", src: "imagenes/timmy.png", role: "head", focusY: .24 },
      { id: "momia", label: "Momia", src: "imagenes/momia.png", role: "target", focusY: .24 },
      { id: "paco", label: "Paco", src: "imagenes/paco.png", role: "target", focusY: .24 },
      { id: "seriente", label: "Seriente", src: "imagenes/seriente.png", role: "target", focusY: .5 }
    ];

    const assets = new Map();
    const targetAssets = [];
    const grid = 15;
    const cell = canvas.width / grid;
    const stepMs = 320;
    const startSnake = [
      { x: 7, y: 7 },
      { x: 6, y: 7 },
      { x: 5, y: 7 }
    ];

    let snake = [];
    let food = null;
    let direction = { x: 0, y: 0 };
    let queuedDirection = { x: 0, y: 0 };
    let score = 0;
    let best = Number(localStorage.getItem("timmy-mobile-best") || 0);
    let running = false;
    let assetsReady = false;
    let lastTick = 0;
    let rafId = null;
    let touchStart = null;

    bestNode.textContent = best;

    function loadImage(asset) {
      return new Promise((resolve) => {
        const image = new Image();
        image.onload = () => resolve({ ...asset, image, loaded: true });
        image.onerror = () => resolve({ ...asset, image: null, loaded: false });
        image.src = asset.src;
      });
    }

    async function boot() {
      const loaded = await Promise.all(assetList.map(loadImage));
      loaded.forEach((asset) => {
        assets.set(asset.id, asset);
        if (asset.role === "target") targetAssets.push(asset);
      });
      assetsReady = true;
      reset();
      overlayTitle.textContent = "Listo";
      overlayText.textContent = "Pulsa Jugar y elige direccion. Timmy no se mueve hasta que deslices o pulses un boton.";
      startButton.disabled = false;
      startButton.textContent = "Jugar";
    }

    function reset() {
      snake = startSnake.map((part) => ({ ...part }));
      direction = { x: 0, y: 0 };
      queuedDirection = { x: 0, y: 0 };
      score = 0;
      food = createFood();
      scoreNode.textContent = score;
      draw();
    }

    function createFood() {
      const freeCells = [];
      for (let y = 0; y < grid; y += 1) {
        for (let x = 0; x < grid; x += 1) {
          if (!snake.some((part) => part.x === x && part.y === y)) {
            freeCells.push({ x, y });
          }
        }
      }
      if (freeCells.length === 0) return null;
      const cellPick = freeCells[Math.floor(Math.random() * freeCells.length)];
      const asset = targetAssets[Math.floor(Math.random() * targetAssets.length)];
      return { ...cellPick, asset };
    }

    function start() {
      if (!assetsReady) return;
      reset();
      running = true;
      overlay.classList.add("hidden");
      lastTick = performance.now() + 260;
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(loop);
    }

    function loop(now) {
      if (!running) return;
      if (now - lastTick >= stepMs) {
        tick();
        lastTick = now;
      }
      draw();
      rafId = requestAnimationFrame(loop);
    }

    function tick() {
      const isWaiting = direction.x === 0 && direction.y === 0;
      if (isWaiting || queuedDirection.x !== -direction.x || queuedDirection.y !== -direction.y) {
        direction = queuedDirection;
      }
      if (direction.x === 0 && direction.y === 0) return;

      const head = snake[0];
      const nextHead = { x: (head.x + direction.x + grid) % grid, y: (head.y + direction.y + grid) % grid };
      const eatsFood = food && nextHead.x === food.x && nextHead.y === food.y;
      const collisionSnake = eatsFood ? snake : snake.slice(0, -1);
      const selfHit = collisionSnake.some((part) => part.x === nextHead.x && part.y === nextHead.y);

      if (selfHit) {
        endGame();
        return;
      }

      snake.unshift(nextHead);
      if (eatsFood) {
        score += 1;
        scoreNode.textContent = score;
        best = Math.max(best, score);
        bestNode.textContent = best;
        localStorage.setItem("timmy-mobile-best", String(best));
        showTukutu();
        food = createFood();
        if (!food) victory();
      } else {
        snake.pop();
      }
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(rafId);
      overlayTitle.textContent = "Fin";
      overlayText.textContent = score ? `Has conseguido ${score} tukutu${score === 1 ? "" : "s"}.` : "Timmy no ha llegado al primer bocado.";
      startButton.textContent = "Otra vez";
      overlay.classList.remove("hidden");
    }

    function victory() {
      running = false;
      cancelAnimationFrame(rafId);
      overlayTitle.textContent = "Completo";
      overlayText.textContent = `Has llenado el tablero con ${score} tukutus.`;
      startButton.textContent = "Repetir";
      overlay.classList.remove("hidden");
    }

    function showTukutu() {
      toast.classList.remove("show");
      void toast.offsetWidth;
      toast.classList.add("show");
    }

    function setDirection(next) {
      if (!next) return;
      if (!running && assetsReady) {
        start();
      }
      const head = snake[0];
      const neck = snake[1];
      if (neck && head.x + next.x === neck.x && head.y + next.y === neck.y) return;
      if ((direction.x !== 0 || direction.y !== 0) && next.x === -direction.x && next.y === -direction.y) return;
      queuedDirection = next;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBoard();
      if (food) drawTarget(food);
      for (let i = snake.length - 1; i >= 1; i -= 1) drawBodySegment(snake[i], i);
      drawHead(snake[0]);
    }

    function drawBoard() {
      ctx.fillStyle = "#aeecc8";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < grid; y += 1) {
        for (let x = 0; x < grid; x += 1) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "rgba(255,255,255,.24)" : "rgba(34,24,23,.04)";
          ctx.fillRect(x * cell, y * cell, cell, cell);
        }
      }

      ctx.strokeStyle = "rgba(34,24,23,.11)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= grid; i += 1) {
        const p = i * cell;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawBodySegment(part, index) {
      const cx = part.x * cell + cell / 2;
      const cy = part.y * cell + cell / 2;
      const pulse = Math.sin(performance.now() / 180 + index) * 1.5;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(index * 1.1 + score) * .08);
      ctx.fillStyle = index % 2 ? "#33d17a" : "#2fb7d8";
      ctx.strokeStyle = "#221817";
      ctx.lineWidth = 4;
      roundRect(-cell * .42, -cell * .34, cell * .84, cell * .68, 12);
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = index % 2 ? "#ffd45a" : "#fff7de";
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-cell * .26, pulse);
      ctx.quadraticCurveTo(0, -cell * .14, cell * .26, pulse);
      ctx.stroke();
      ctx.restore();
    }

    function drawTarget(target) {
      const cx = target.x * cell + cell / 2;
      const cy = target.y * cell + cell / 2;
      const size = cell * 1.7;
      const lift = Math.sin(performance.now() / 240) * 4;

      ctx.save();
      ctx.translate(cx, cy + lift);
      ctx.fillStyle = "rgba(34,24,23,.25)";
      ctx.beginPath();
      ctx.ellipse(3, size * .34, size * .34, size * .08, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fff7de";
      ctx.strokeStyle = "#221817";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(0, 0, size * .5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, size * .43, 0, Math.PI * 2);
      ctx.clip();
      drawImageCover(target.asset, 0, 0, size * .88, size * .88);
      ctx.restore();

      ctx.strokeStyle = "#ef4444";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, 0, size * .51, -.2, Math.PI * .72);
      ctx.stroke();
      ctx.restore();
    }

    function drawHead(part) {
      const cx = part.x * cell + cell / 2;
      const cy = part.y * cell + cell / 2;
      const size = cell * 1.95;
      const timmy = assets.get("timmy");

      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = "rgba(34,24,23,.25)";
      ctx.beginPath();
      ctx.ellipse(4, size * .36, size * .32, size * .08, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffd45a";
      ctx.strokeStyle = "#221817";
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(0, 0, size * .47, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, size * .42, 0, Math.PI * 2);
      ctx.clip();
      drawImageCover(timmy, 0, 0, size * .9, size * .9);
      ctx.restore();

      drawDirectionMark(direction, size);
      ctx.restore();
    }

    function drawDirectionMark(dir, size) {
      const angle = Math.atan2(dir.y, dir.x);
      ctx.save();
      ctx.rotate(angle);
      ctx.fillStyle = "#ef4444";
      ctx.strokeStyle = "#221817";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(size * .52, 0);
      ctx.lineTo(size * .37, -size * .08);
      ctx.lineTo(size * .37, size * .08);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawImageCover(asset, cx, cy, boxW, boxH) {
      if (!asset || !asset.loaded || !asset.image) {
        ctx.fillStyle = "#5ed6ff";
        ctx.fillRect(cx - boxW / 2, cy - boxH / 2, boxW, boxH);
        return;
      }

      const image = asset.image;
      const sourceRatio = image.width / image.height;
      const targetRatio = boxW / boxH;
      let sx = 0;
      let sy = 0;
      let sw = image.width;
      let sh = image.height;

      if (sourceRatio > targetRatio) {
        sw = image.height * targetRatio;
        sx = (image.width - sw) / 2;
      } else {
        sh = image.width / targetRatio;
        const focusY = asset.focusY ?? .5;
        sy = Math.max(0, Math.min(image.height - sh, image.height * focusY - sh / 2));
      }

      ctx.drawImage(image, sx, sy, sw, sh, cx - boxW / 2, cy - boxH / 2, boxW, boxH);
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    const keyMap = {
      ArrowUp: directions.up,
      KeyW: directions.up,
      ArrowDown: directions.down,
      KeyS: directions.down,
      ArrowLeft: directions.left,
      KeyA: directions.left,
      ArrowRight: directions.right,
      KeyD: directions.right
    };

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space" || event.code === "Enter") {
        if (!running) start();
        return;
      }
      const next = keyMap[event.code];
      if (next) {
        event.preventDefault();
        setDirection(next);
      }
    });

    document.querySelectorAll("[data-dir]").forEach((button) => {
      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        setDirection(directions[button.dataset.dir]);
      });
    });

    stage.addEventListener("pointerdown", (event) => {
      touchStart = { x: event.clientX, y: event.clientY };
    });

    stage.addEventListener("pointerup", (event) => {
      if (!touchStart) return;
      const dx = event.clientX - touchStart.x;
      const dy = event.clientY - touchStart.y;
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 12) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? directions.right : directions.left);
      } else {
        setDirection(dy > 0 ? directions.down : directions.up);
      }
    });

    overlay.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      start();
    });
    overlay.addEventListener("click", (event) => {
      event.preventDefault();
    });
    startButton.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      start();
    });
    startButton.addEventListener("click", (event) => {
      event.preventDefault();
    });
    boot();
  </script>
</body>
</html>
