<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timmy desactivado</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #fff7de;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    main {
      max-width: 520px;
      border: 4px solid #fff7de;
      padding: 28px;
      background: #1f2937;
      box-shadow: 8px 8px 0 #000;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 10vw, 64px);
      line-height: 1;
    }
    p {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main>
    <h1>Timmy</h1>
    <p>Juego desactivado.</p>
  </main>
</body>
</html>
